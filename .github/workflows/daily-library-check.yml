name: Daily Library Check

on:
  schedule:
    - cron: '0 18 * * 5'
  workflow_dispatch:

jobs:
  update-html:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install selenium webdriver-manager beautifulsoup4

      - run: |
          echo "[user_1]" > config.ini
          echo "username=${{ vars.LIBRARY_USER_1_USERNAME }}" >> config.ini
          echo "password=${{ secrets.LIBRARY_USER_1_PASSWORD }}" >> config.ini
          echo "" >> config.ini
          echo "[user_2]" >> config.ini
          echo "username=${{ vars.LIBRARY_USER_2_USERNAME }}" >> config.ini
          echo "password=${{ secrets.LIBRARY_USER_2_PASSWORD }}" >> config.ini
          echo "" >> config.ini
          echo "[user_3]" >> config.ini
          echo "username=${{ vars.LIBRARY_USER_3_USERNAME }}" >> config.ini
          echo "password=${{ secrets.LIBRARY_USER_3_PASSWORD }}" >> config.ini
          echo "" >> config.ini
          echo "[user_4]" >> config.ini
          echo "username=${{ vars.LIBRARY_USER_4_USERNAME }}" >> config.ini
          echo "password=${{ secrets.LIBRARY_USER_4_PASSWORD }}" >> config.ini

      - run: |
          source .venv/bin/activate
          python library_checker.py

      - run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/index.html
          git commit -m 'Update docs/index.html [skip ci]' || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
